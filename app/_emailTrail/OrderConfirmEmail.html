<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Confirmation - Surge</title>
  <!-- Using Montserrat for a clean, professional look similar to the image -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body, table, td, p, span, h1, h2, strong {
      font-family: 'Montserrat', sans-serif !important;
      -webkit-font-smoothing: antialiased;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: #f9f9f9;
    }

    .container-table {
      background-color: #ffffff;
      border: 1px solid #eeeeee;
    }

    @media only screen and (max-width: 600px) {
      .container-table {
        width: 100% !important;
      }
      .content-padding {
        padding: 30px 20px !important;
      }
    }
  </style>
</head>

<body>

  <div id="email-container"></div>

  <script>
    const order = {
      id: "2864297643",
      createdAt: "2025-12-31",
      email: "ahmed.almansouri@email.com",
      items: [
        { productName: "Brazil Santa Ines", variantName: "250", quantity: 1, price: 50 },
        { productName: "Brazil Santa Ines", variantName: "250", quantity: 1, price: 50 },
        { productName: "Brazil Santa Ines", variantName: "250", quantity: 1, price: 50 }
      ],
      shippingAddress: {
        addressFirstName: "Ahmed",
        addressLastName: "Almansouri",
        addressLine1: "Office 1502, Jumeirah Business Centre 1",
        addressLine2: "Jumeirah Lakes Towers (JLT)",
        city: "Dubai",
        emirates: "Dubai",
        addressCountry: "UAE",
        postal: "450123"
      },
      financials: {
        subtotal: 150,
        shippingCharge: 200,
        couponDiscount: 20,
        taxAmount: 5.40,
        total: 1725.40
      }
    };

    const LOGO_URL = 'https://wordpressbackend.whitemantis.ae/wp-content/uploads/2026/01/SURGE_Logo_Image.png';
    const ACCENT_COLOR = '#C4754E'; // Surge Orange
    const TEXT_DARK = '#414343';
    const TEXT_LIGHT = '#818686';

    const template = `

        <tr>
          <td align="center" style="padding: 40px 0;">
            <table class="container-table" border="0" cellpadding="0" cellspacing="0" width="600">
              <tr>
                <td class="content-padding" style="padding: 29px 26px 37px; ">
                  
                  <!-- Header -->
                  <table border="0" cellpadding="0" cellspacing="0" width="100%" style="margin-bottom: 30px;">
                    <tr>
                      <td align="left"><img src="${LOGO_URL}" width="100" alt="Surge"></td>
                      <td align="right" style="font-size: 16px; font-weight: 400; color: ${TEXT_DARK};">
                        Order Id : ${order.id} 
                        <span style="display:inline-block; vertical-align:middle; margin-left:5px; cursor:pointer;">
                         <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
<mask id="mask0_8925_22376" style="mask-type:alpha" maskUnits="userSpaceOnUse" x="0" y="0" width="20" height="20">
<rect width="20" height="20" fill="#D9D9D9"/>
</mask>
<g mask="url(#mask0_8925_22376)">
<path d="M7.54813 14.5859C7.12715 14.5859 6.77083 14.4401 6.47917 14.1484C6.1875 13.8568 6.04167 13.5005 6.04167 13.0795V3.5924C6.04167 3.17142 6.1875 2.8151 6.47917 2.52344C6.77083 2.23177 7.12715 2.08594 7.54813 2.08594H14.5352C14.9562 2.08594 15.3125 2.23177 15.6042 2.52344C15.8958 2.8151 16.0417 3.17142 16.0417 3.5924V13.0795C16.0417 13.5005 15.8958 13.8568 15.6042 14.1484C15.3125 14.4401 14.9562 14.5859 14.5352 14.5859H7.54813ZM7.54813 13.3359H14.5352C14.5994 13.3359 14.6581 13.3092 14.7115 13.2557C14.7649 13.2024 14.7917 13.1436 14.7917 13.0795V3.5924C14.7917 3.52823 14.7649 3.46948 14.7115 3.41615C14.6581 3.36267 14.5994 3.33594 14.5352 3.33594H7.54813C7.48396 3.33594 7.42521 3.36267 7.37188 3.41615C7.3184 3.46948 7.29167 3.52823 7.29167 3.5924V13.0795C7.29167 13.1436 7.3184 13.2024 7.37188 13.2557C7.42521 13.3092 7.48396 13.3359 7.54813 13.3359ZM4.63146 17.5026C4.21049 17.5026 3.85417 17.3568 3.5625 17.0651C3.27083 16.7734 3.125 16.4171 3.125 15.9961V5.25906H4.375V15.9961C4.375 16.0603 4.40174 16.1191 4.45521 16.1724C4.50854 16.2259 4.56729 16.2526 4.63146 16.2526H12.8685V17.5026H4.63146Z" fill="#414343"/>
</g>
</svg>

                        </span>
                      </td>
                    </tr>
                  </table>

                  <!-- Confirmation Title -->
                  <table border="0" cellpadding="0" cellspacing="0" width="100%" style="margin-bottom: 30px;">
                    <tr>
                      <td style="font-size: 22px; font-weight: 600; color: ${TEXT_DARK};">
                        <span style="display:inline-block; vertical-align:middle; margin-right:8px; color: ${TEXT_LIGHT};">
                         <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
<path fill-rule="evenodd" clip-rule="evenodd" d="M10 20C4.477 20 0 15.523 0 10C0 4.477 4.477 0 10 0C15.523 0 20 4.477 20 10C20 15.523 15.523 20 10 20ZM10 18.8C12.3339 18.8 14.5722 17.8729 16.2225 16.2225C17.8729 14.5722 18.8 12.3339 18.8 10C18.8 7.66609 17.8729 5.42778 16.2225 3.77746C14.5722 2.12714 12.3339 1.2 10 1.2C7.66609 1.2 5.42778 2.12714 3.77746 3.77746C2.12714 5.42778 1.2 7.66609 1.2 10C1.2 12.3339 2.12714 14.5722 3.77746 16.2225C5.42778 17.8729 7.66609 18.8 10 18.8ZM8.828 12.558L14.637 6.75L15.485 7.599L9.535 13.549C9.34747 13.7365 9.09316 13.8418 8.828 13.8418C8.56284 13.8418 8.30853 13.7365 8.121 13.549L5 10.426L5.849 9.577L8.829 12.557L8.828 12.558Z" fill="#414343"/>
</svg>

                        </span>
                        Your Order Is Confirmed!
                      </td>
                    </tr>
                  </table>

                  <p style="font-size: 16px; color: ${TEXT_LIGHT}; margin: 0 0 15px 0;">Hi ${order.shippingAddress.addressFirstName},</p>
                  <p style="font-size: 16px; color: ${TEXT_LIGHT}; line-height: 1.6; margin: 0 0 32px 0;">
                    Thank you for your purchase from White Mantis. Your order has been successfully placed and we're already preparing it with care.
                  </p>

                  <div style="margin-bottom: 50px;">
                    <a href="#" style="background-color: ${ACCENT_COLOR}; color: #ffffff; text-decoration: none; padding: 13px 47px; font-size: 16px; font-weight: 500; display: inline-block;">View order</a>
                  </div>

                  <!-- Order Summary -->
                             <div style="padding-bottom: 25px;">
  <h2 style="font-size: 22px; font-weight:400 ; color: #2F362A; margin: 0; display: inline-block; vertical-align: middle;">
    Order Summary
  </h2>
  <span style="font-size: 16px; font-weight:400 ; color: #2F362A; vertical-align: middle;">
    (${order.items.length} items)
  </span>
</div>
                 <table border="0" cellpadding="0" cellspacing="0" width="100%" style="margin-bottom: 25px; border-collapse: collapse;">
  ${order.items.map(item => `
    <tr>
      <!-- Image Cell -->
      <td style="padding: 16px 0; width: 60px; border-top: 1px solid #f0f0f0;">
        <div style="width: 50px; height: 65px; overflow: hidden;">
          <img 
            src="/coff.png" 
            alt="${item.productName}" 
            width="50" 
            height="65" 
            style="display: block; border: 0;"
          >
        </div>
      </td>
      
      <!-- Product Details (Width tight rakha hai gap kam karne ke liye) -->
      <td style="padding: 16px 15px; width: 200px;">
        <p style="font-size: 16px; font-weight: 400; color: #2F362A; margin: 0; line-height: 1.2;">${item.productName}</p>
        <p style="font-size: 16px; font-weight: 400; color: #2F362A; margin: 0; line-height: 1.2;">${item.variantName}g</p>
      </td>

      <!-- Quantity -->
      <td align="center" style="padding: 16px 10px;  font-size: 16px;font-weight:400; color: #2F362A; width: 50px;">
        ×${item.quantity}
      </td>

      <!-- Price (Right aligned) -->
      <td align="right" style="padding: 16px 0;  font-size: 16px; color: #2F362A; white-space: nowrap;">
        AED ${item.price}
      </td>
    </tr>
  `).join('')}
</table>

                  <!-- Totals -->
                  <table border="0" cellpadding="0" cellspacing="0" width="100%" style="font-size: 16px; color: ${TEXT_DARK}; margin-bottom: 60px;">
                    <tr><td style="padding: 16px 0; border-top: 1px solid #2F362A;">Subtotal</td><td align="right" style="padding: 8px 0; border-top: 1px solid #2F362A; color:${TEXT_DARK}">${order.financials.subtotal}</td></tr>
                    <tr><td style="padding: 16px 0;">Shipping</td><td align="right" style="padding: 8px 0; color:${TEXT_DARK}">AED ${order.financials.shippingCharge}</td></tr>
                    <tr><td style="padding: 16px 0;">Coupon Discount</td><td align="right" style="padding: 8px 0; color:${TEXT_DARK}">AED ${order.financials.couponDiscount}</td></tr>
                    <tr><td style="padding: 16px 0; border-bottom: 1px solid #818686; padding-bottom:15px;">VAT</td><td align="right" style="padding: 8px 0; border-bottom: 1px solid #818686; padding-bottom:15px; color:${TEXT_DARK}">AED ${order.financials.taxAmount}</td></tr>
                    <tr style="font-weight: 700; color: ${TEXT_DARK};">
                      <td style="padding: 16px 0;">Total</td>
                      <td align="right" style="padding: 20px 0 ;">AED ${order.financials.total.toFixed(2)}</td>
                    </tr>
                  </table>

                  <!-- Customer Info Grid -->
 <h2 style="font-size: 22px; font-weight: 400; color: ${TEXT_DARK}; margin: 0 0 20px 0;">Customer Information</h2>
<table border="0" cellpadding="0" cellspacing="0" width="100%" style="font-size: 16px; color: ${TEXT_LIGHT};">
  <tr>
    <!-- Left Column (Compact) -->
    <td width="50%" valign="top">
      <div style="margin-bottom: 24px;">
        <strong style="color: ${TEXT_DARK}; display: block; font-weight: 400; margin-bottom: 10px;">Name</strong>
        <span style="display: block; line-height: 1.2;">${order.shippingAddress.addressFirstName} ${order.shippingAddress.addressLastName}</span>
      </div>
      
      <div style="margin-bottom: 24px;">
        <strong style="color: ${TEXT_DARK}; display: block; font-weight: 400; margin-bottom: 10px;">Email</strong>
        <span style="display: block; line-height: 1.2;">${order.email}</span>
      </div>

      <div style="margin-bottom: 24px;">
        <strong style="color: ${TEXT_DARK}; display: block; font-weight: 400; margin-bottom: 10px;">Phone</strong>
        <span style="display: block; line-height: 1.2;">917xxxxxxxxxx</span>
      </div>

      <div style="margin-bottom: 24px;">
        <strong style="color: ${TEXT_DARK}; display: block; font-weight: 400; margin-bottom: 10px;">Order Date</strong>
        <span style="display: block; line-height: 1.2;">31 December, 2025</span>
      </div>
    </td>

    <!-- Right Column (Addresses) -->
    <td width="50%" valign="top">
      <div style="margin-bottom: 24px;">
        <strong style="color: ${TEXT_DARK}; display: block; font-weight: 400; margin-bottom: 10px;">Payment Method</strong>
        <span style="display: block; line-height: 1.2;">Stripe</span>
      </div>

      <div style="margin-bottom: 24px;">
        <strong style="color: ${TEXT_DARK}; display: block; font-weight: 400; margin-bottom: 10px;">Shipping Address</strong>
        <span style="display: block; line-height: 1.4;">${formatAddr(order.shippingAddress)}</span>
      </div>

      <div style="margin-bottom: 0;">
        <strong style="color: ${TEXT_DARK}; display: block; font-weight: 400; margin-bottom: 10px;">Billing Address</strong>
        <span style="display: block; line-height: 1.4;">${formatAddr(order.shippingAddress)}</span>
      </div>
    </td>
  </tr>
</table>

                  <!-- Footer Text -->
                  <div style="margin-top: 16px; padding-top: 6px; border-top: 1px solid #2F362A4D; font-size: 16px; font-weight:400; color: ${TEXT_LIGHT}; line-height: 1.6;">
                    <p>Your order will be dispatched within 2–3 business days. Once shipped, you'll receive tracking details by email.</p>
                    <p style="margin-top: 15px; font-size: 16px; font-weight:400;color: ${TEXT_DARK}; ">Please note: once your order is dispatched, it can no longer be <br>cancelled. 
                      <br>For assistance, reach out to our Customer Support team.</p>
                    <p style="margin-top: 40px; font-size: 16px; font-weight:400;color: ${TEXT_DARK};">Need help? Reach us at<br>
                    <a href="mailto:support@whitemantis.com" style="color: ${ACCENT_COLOR}; text-decoration: underline; "margin-top:8px; font-size: 16px; font-weight:400; color: ${TEXT_DARK};">support@whitemantis.com</a></p>
                    <p style="margin-top: 20px; color: ${TEXT_DARK}; font-size: 16px; font-weight:400;">Happy brewing,<br><strong style=" color: ${TEXT_DARK}; font-size: 16px; font-weight:400 ">Team White Mantis</strong></p>
                  </div>

                </td>
              </tr>
            </table>
          </td>
        </tr>
      </table>
    `;

    document.getElementById('email-container').innerHTML = template;
  </script>
</body>

</html>
